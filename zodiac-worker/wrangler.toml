name = "zodiac-worker"
main = "src/index.ts"
compatibility_date = "2024-12-18"

[vars]
SUPABASE_URL = "https://owmmrkowqkjbrimazftv.supabase.co"

# 🔐 Secrets (set via CLI)
# wrangler secret put SUPABASE_SERVICE_ROLE_KEY
# wrangler secret put ONESIGNAL_APP_ID
# wrangler secret put ONESIGNAL_API_KEY

# 🔥 BALANCED CRON (3x per day — NOT spammy)
[[triggers]]
crons = [
  "0 8 * * *",   # Morning UTC (captures EU/Africa morning)
  "0 15 * * *",  # Midday UTC (captures US morning)
  "0 18 * * *", # Daily at 6 PM UTC (evening)
  "0 21 * * *"   # Evening UTC (captures US evening / Asia night)
]