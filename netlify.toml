[build]
  command = "npm ci && npx vite build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "development"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://m.stripe.network https://m.stripe.com https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net https://www.googletagservices.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://zodiac-worker.zodiac-app.workers.dev https://api.stripe.com https://m.stripe.com https://m.stripe.network https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net https://ip-api.com https://geocoding-api.open-meteo.com https://nominatim.openstreetmap.org; frame-src https://js.stripe.com https://hooks.stripe.com https://googleads.g.doubleclick.net https://tpc.googlesyndication.com; frame-ancestors 'none';" 